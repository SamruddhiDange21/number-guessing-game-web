<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Number Guesser</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-panel main-game-card">
        <h1>Number Guessing Game</h1>
        <p class="subtitle">I'm thinking of a number between <strong>1</strong> and <strong>100</strong>.</p>

        <div class="input-area">
            <input type="number" id="guessInput" placeholder="Enter your guess..." min="1" max="100">
            <button id="submitBtn" onclick="checkGuess()">Guess!</button>
        </div>
        
        <button id="resetBtn" class="hidden" onclick="resetGame()">Play Again</button>

        <p id="message" class="message"></p>
        
        <div class="stats">
            <span id="attemptsText">Attempts: 0</span>
        </div>

        <div class="history-container">
            <h3>Guess History</h3>
            <ul id="guessHistory">
                <!-- History list will be populated here -->
            </ul>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
